<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>コメント承認（管理人用）</title>
<style>
  :root{--deep:#dd6212;--pink:#ff8a32;--plum:#6b4a2e;--bg:#fff4e0;--box:#fffdf7;--line:#ffd29c;--sub:#b08a63}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--plum);font-family:"Zen Maru Gothic",Meiryo,system-ui,sans-serif;line-height:1.7}
  .wrap{max-width:760px;margin:0 auto;padding:22px 16px 60px}
  h1{font-size:19px;color:var(--deep);margin:0 0 4px}
  .note{font-size:12px;color:var(--sub);margin:0 0 18px}
  .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
  input[type=password]{font:inherit;padding:8px 12px;border:2px solid var(--line);border-radius:8px;background:#fff;min-width:200px}
  button{font-family:inherit;font-size:13px;border:0;border-radius:999px;padding:7px 16px;cursor:pointer;background:var(--deep);color:#fff}
  button:hover{background:var(--pink)}
  button.ghost{background:#fff;color:var(--deep);border:2px solid var(--line)}
  button.danger{background:#c0453a}
  h2{font-size:15px;color:var(--deep);border-bottom:2px solid var(--line);padding-bottom:4px;margin:26px 0 12px}
  .c{background:var(--box);border:2px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
  .c .meta{font-size:11.5px;color:var(--sub);margin-bottom:4px}
  .c .name{font-weight:700;color:var(--deep)}
  .c .body{white-space:pre-wrap;margin:4px 0 10px}
  .c .acts{display:flex;gap:8px;flex-wrap:wrap}
  .msg{font-size:13px;color:var(--sub);min-height:1.4em}
  .empty{font-size:13px;color:var(--sub)}
</style>
</head>
<body>
<div class="wrap">
  <h1>コメント承認（管理人用）</h1>
  <p class="note">「管理人のひとりごと」への投稿を承認・削除できます。パスワードを入れて「読み込む」。このページは検索避け設定済み・非公開です。</p>
  <div class="bar">
    <input id="pw" type="password" placeholder="管理パスワード" autocomplete="current-password">
    <button onclick="load()">読み込む</button>
    <button class="ghost" onclick="refresh()">再読み込み</button>
  </div>
  <p id="msg" class="msg"></p>

  <h2>承認待ち（<span id="pcount">0</span>）</h2>
  <div id="pending"></div>

  <h2>公開中（<span id="acount">0</span>）</h2>
  <div id="approved"></div>
</div>

<script>
const FN = "https://lvzyrudfnuoymlpgixxd.supabase.co/functions/v1/moderate";
let pw = sessionStorage.getItem("nbpw") || "";
const $ = s => document.querySelector(s);
const esc = s => (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
const msg = t => { $("#msg").textContent = t || ""; };

async function call(action, id) {
  const res = await fetch(FN, { method:"POST", headers:{ "content-type":"application/json" },
    body: JSON.stringify({ password: pw, action, id }) });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
  return data;
}

function card(c) {
  const d = new Date(c.created_at);
  const dt = isNaN(d) ? "" : d.toLocaleString("ja-JP");
  const btns = c.approved
    ? `<button class="ghost" onclick="act(${c.id},'unapprove')">非公開に戻す</button>
       <button class="danger" onclick="act(${c.id},'delete')">削除</button>`
    : `<button onclick="act(${c.id},'approve')">承認して公開</button>
       <button class="danger" onclick="act(${c.id},'delete')">削除</button>`;
  return `<div class="c">
    <div class="meta">ひとりごと ${esc(c.entry_date)} ／ ${esc(dt)}</div>
    <div><span class="name">${esc(c.name)}</span></div>
    <div class="body">${esc(c.body)}</div>
    <div class="acts">${btns}</div>
  </div>`;
}

function render(list) {
  const pending = list.filter(c => !c.approved);
  const approved = list.filter(c => c.approved);
  $("#pcount").textContent = pending.length;
  $("#acount").textContent = approved.length;
  $("#pending").innerHTML = pending.length ? pending.map(card).join("") : '<p class="empty">承認待ちはありません。</p>';
  $("#approved").innerHTML = approved.length ? approved.map(card).join("") : '<p class="empty">公開中のコメントはありません。</p>';
}

async function refresh() {
  if (!pw) { msg("パスワードを入れて「読み込む」を押してください。"); return; }
  msg("読み込み中…");
  try { const { comments } = await call("list"); render(comments || []); msg(""); }
  catch (e) { msg("エラー：" + e.message + "（パスワード違い等）"); }
}

function load() {
  pw = $("#pw").value.trim();
  if (!pw) { msg("パスワードを入力してください。"); return; }
  sessionStorage.setItem("nbpw", pw);
  refresh();
}

async function act(id, action) {
  if (action === "delete" && !confirm("このコメントを削除しますか？")) return;
  try { await call(action, id); await refresh(); }
  catch (e) { alert("失敗：" + e.message); }
}

// 前回のパスワードがあれば自動読み込み
if (pw) { $("#pw").value = pw; refresh(); }
</script>
</body>
</html>
